backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "images/uploads"

collections:
  - name: "data"
    label: "Website Engine Data"
    files:
      - name: "portfolio"
        label: "Master Project Grid"
        file: "projects.json"
        fields:
          - name: "projects"
            label: "Active Projects"
            widget: "list"
            summary: '{{fields.title}} [{{fields.alignment}}]'
            fields:
              - { label: "Project Title / Name", name: "title", widget: "string", hint: "Example: Laleh Studio Packaging" }
              - { label: "Category & Medium", name: "category", widget: "string", hint: "Example: Brand Identity & Strategy" }
              - { label: "High-Resolution Image File", name: "image", widget: "image" }
              - label: "Grid Structural Alignment"
                name: "alignment"
                widget: "select"
                options:
                  - { label: "Standard Grid Block (1x1 Square)", value: "standard" }
                  - { label: "Wide Horizontal Accent (2x1 Spanning Layout)", value: "wide" }
                  - { label: "Tall Vertical Portrait Accent (1x2 Spanning Layout)", value: "tall" }
                default: "standard"