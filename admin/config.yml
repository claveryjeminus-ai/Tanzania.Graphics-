backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "images/uploads"

collections:
  - name: "data"
    label: "Website Engine Data"
    files:
      - name: "portfolio"
        label: "Clay Doe Portfolio Grid"
        file: "projects.json"
        fields:
          - name: "projects"
            label: "Active Projects"
            widget: "list"
            summary: '{{fields.title}} [{{fields.category_filter}}]'
            fields:
              - { label: "Project Title / Name", name: "title", widget: "string" }
              - label: "Category Filter Tag (Lowercase, no spaces)"
                name: "category_filter"
                widget: "select"
                options:
                  - { label: "Branding / Identity", value: "web" }
                  - { label: "Product Packaging", value: "ux" }
                  - { label: "Digital Content", value: "design" }
                default: "web"
              - { label: "Display Subtext Category", name: "subtext", widget: "string", hint: "Example: Logo Design" }
              - { label: "High-Resolution Image File", name: "image", widget: "image" }